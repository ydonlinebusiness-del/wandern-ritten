name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: pnpm einrichten
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Abhängigkeiten installieren
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Tests
        run: pnpm test

      - name: Build
        run: pnpm build
        env:
          # Build läuft ohne externe Dienste; Platzhalter verhindern Warnungen.
          NEXT_TELEMETRY_DISABLED: "1"
